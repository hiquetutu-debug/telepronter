<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="App de letras de músicas com auto-scroll">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%2316c784'/><path d='M96 60v72M80 80l32-20' stroke='white' stroke-width='8' stroke-linecap='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%2316c784'/></svg>">
    <title>Teleprompter - Letras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🎵 Teleprompter</h1>
                <span class="install-prompt" id="installPrompt">📥 Instalar</span>
            </div>
        </header>

        <!-- Modo de Input -->
        <div class="input-section">
            <textarea 
                id="musicInput" 
                placeholder="Digite uma música ou cole várias (uma por linha)&#10;Exemplo:&#10;Imagine - The Beatles&#10;In Bloom – Nirvana&#10;Bohemian Rhapsody - Queen"
                class="input-field input-textarea"
                rows="4"
            ></textarea>
            <div class="input-buttons">
                <button id="addBtn" class="btn btn-add">➕ Adicionar</button>
                <button id="clearBtn" class="btn btn-secondary">🗑️ Limpar Playlist</button>
            </div>
        </div>

        <!-- Lista de Músicas -->
        <div class="playlist-section">
            <div class="playlist-header">
                <h2>Sua Playlist</h2>
                <div class="playlist-actions">
                    <button id="generateAllBtn" class="btn btn-generate">⚡ Gerar Todas</button>
                    <button id="clearGeneratedBtn" class="btn btn-secondary">🗑️ Limpar Letras</button>
                </div>
            </div>
            <ul id="playlistUl" class="playlist">
                <li class="empty-state">Adicione uma música para começar!</li>
            </ul>
        </div>
        
        <!-- Letras Geradas -->
        <div id="generatedLyricsSection" class="generated-section hidden">
            <div class="generated-header">
                <h2>Letras Geradas</h2>
                <button class="btn-close" id="closeGeneratedSection">&times;</button>
            </div>
            <div id="generatedLyricsList" class="generated-list">
            </div>
        </div>

        <!-- Leitor de Letras -->
        <div id="lyricsModal" class="modal hidden">
            <div class="modal-content">
                <div class="lyrics-header">
                    <button class="btn-close" id="closeLyrics">&times;</button>
                    <h2 id="currentSongTitle">Título da Música</h2>
                </div>

                <div class="lyrics-controls">
                    <button id="playPauseBtn" class="btn btn-control btn-play">▶ Play</button>
                    <div class="speed-control">
                        <label for="speedSlider">Velocidade:</label>
                        <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1" class="slider">
                        <span id="speedValue">1x</span>
                    </div>
                    <button id="resetBtn" class="btn btn-secondary">↻ Reset</button>
                </div>

                <div id="lyricsContainer" class="lyrics-container">
                    <div class="lyrics-text" id="lyricsText">
                        Carregando letras...
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
